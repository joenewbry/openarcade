<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tank Royale - OpenArcade</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #121625;
  color: #dce6ff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
a { color: #57b8ff; }
#back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  z-index: 20;
  color: #57b8ff;
  text-decoration: none;
  font-size: 14px;
  text-shadow: 0 0 10px rgba(87, 184, 255, 0.65);
}
#score-bar {
  width: 720px;
  max-width: 95vw;
  margin-top: 44px;
  margin-bottom: 8px;
  padding: 8px 12px;
  border: 1px solid rgba(87, 184, 255, 0.3);
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px 14px;
  background: rgba(28, 38, 66, 0.55);
  font-size: 13px;
}
#score-bar .value { color: #57b8ff; font-weight: bold; }
#game-wrap {
  position: relative;
  width: min(95vw, 720px);
  aspect-ratio: 12 / 7;
}
canvas#game {
  width: 100%;
  height: 100%;
  border: 1px solid rgba(87, 184, 255, 0.28);
  border-radius: 8px;
  display: block;
  background: #0b0f1e;
}
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 10px;
  background: rgba(7, 9, 16, 0.86);
  border-radius: 8px;
  padding: 12px;
}
#overlayTitle {
  color: #57b8ff;
  text-shadow: 0 0 14px rgba(87, 184, 255, 0.8);
  font-size: clamp(22px, 4.5vw, 34px);
}
#overlayText {
  max-width: 86%;
  color: #c3d5ff;
  font-size: clamp(11px, 2.2vw, 14px);
  line-height: 1.5;
  white-space: pre-line;
}
#overlayButtons { display: flex; gap: 10px; }
.overlay-btn {
  border: 1px solid rgba(87, 184, 255, 0.7);
  background: rgba(29, 52, 89, 0.78);
  color: #dceeff;
  font-weight: bold;
  border-radius: 10px;
  min-width: 108px;
  padding: 10px 14px;
  cursor: pointer;
}
#touch-controls { position: absolute; inset: 0; pointer-events: none; }
.touch-btn {
  pointer-events: auto;
  touch-action: none;
  border: 1px solid rgba(87, 184, 255, 0.5);
  background: rgba(25, 44, 78, 0.55);
  color: #cbe6ff;
  font-size: 22px;
  border-radius: 12px;
  width: 58px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
}
.touch-btn.active { background: rgba(87, 184, 255, 0.35); }
#btn-up    { left: 66px;  bottom: 136px; }
#btn-left  { left: 8px;   bottom: 78px; }
#btn-down  { left: 66px;  bottom: 20px; }
#btn-right { left: 124px; bottom: 78px; }
#btn-fire {
  right: 12px;
  bottom: 36px;
  width: 86px;
  height: 86px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: bold;
}
#hint {
  width: min(95vw, 720px);
  margin-top: 8px;
  text-align: center;
  font-size: 11px;
  color: #6f8bc7;
}
@media (pointer: fine) { #touch-controls { display: none; } }
</style>
</head>
<body>
  <a id="back-link" href="../">&#8592; OpenArcade</a>

  <div id="score-bar">
    <span>SCORE <span class="value" id="score">0</span></span>
    <span>BEST <span class="value" id="best">0</span></span>
    <span>HP <span class="value" id="hp">100</span></span>
    <span>ENEMIES <span class="value" id="enemies">0</span></span>
    <span>STATE <span class="value" id="phase">MENU</span></span>
  </div>

  <div id="game-wrap">
    <canvas id="game" width="720" height="420"></canvas>

    <div id="touch-controls" aria-hidden="true">
      <button class="touch-btn" id="btn-up">&#9650;</button>
      <button class="touch-btn" id="btn-left">&#9664;</button>
      <button class="touch-btn" id="btn-down">&#9660;</button>
      <button class="touch-btn" id="btn-right">&#9654;</button>
      <button class="touch-btn" id="btn-fire">FIRE</button>
    </div>

    <div id="overlay">
      <h1 id="overlayTitle">TANK ROYALE</h1>
      <p id="overlayText">Integrated gameplay scene.</p>
      <div id="overlayButtons">
        <button class="overlay-btn" id="overlayPlay">PLAY</button>
        <button class="overlay-btn" id="overlayRestart" hidden>RESTART</button>
        <button class="overlay-btn" id="overlayMenu" hidden>MENU</button>
      </div>
    </div>
  </div>

  <div id="hint">Move: WASD / Arrow Keys / Touch D-pad. Fire: Space / Touch FIRE. Esc or M for menu.</div>

  <script type="module">
    import { createGame } from './gameplay-scene.js';
    createGame();
  </script>
  <script src="../rating.js?v=2"></script>
</body>
</html>
