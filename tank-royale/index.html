<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tank Royale - OpenArcade</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}
body {
  font-family: 'Courier New', monospace;
  background: #121625;
  color: #dce6ff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  padding: calc(var(--safe-top) + 6px) calc(var(--safe-right) + 10px) calc(var(--safe-bottom) + 8px) calc(var(--safe-left) + 10px);
}
a { color: #57b8ff; }
#back-link {
  position: fixed;
  top: calc(var(--safe-top) + 10px);
  left: calc(var(--safe-left) + 12px);
  z-index: 20;
  color: #57b8ff;
  text-decoration: none;
  font-size: 14px;
  text-shadow: 0 0 10px rgba(87, 184, 255, 0.65);
}
#score-bar {
  width: 720px;
  max-width: 95vw;
  margin-top: clamp(38px, 7vh, 56px);
  margin-bottom: 8px;
  padding: 8px 10px;
  border: 1px solid rgba(87, 184, 255, 0.3);
  border-radius: 8px;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
  background: rgba(28, 38, 66, 0.55);
  font-size: 13px;
}
#score-bar .hud-item {
  display: block;
  text-align: center;
  white-space: nowrap;
}
#score-bar .value {
  color: #57b8ff;
  font-weight: bold;
}
#game-wrap {
  position: relative;
  width: min(95vw, 720px);
  aspect-ratio: 12 / 7;
}
canvas#game {
  width: 100%;
  height: 100%;
  border: 1px solid rgba(87, 184, 255, 0.28);
  border-radius: 8px;
  display: block;
  background: #0b0f1e;
}
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 10px;
  background: rgba(7, 9, 16, 0.86);
  border-radius: 8px;
  padding: 12px;
}
#overlayTitle {
  color: #57b8ff;
  text-shadow: 0 0 14px rgba(87, 184, 255, 0.8);
  font-size: clamp(22px, 4.5vw, 34px);
}
#overlayText {
  max-width: 86%;
  color: #c3d5ff;
  font-size: clamp(11px, 2.2vw, 14px);
  line-height: 1.5;
  white-space: pre-line;
}
#overlayButtons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.overlay-btn {
  border: 1px solid rgba(87, 184, 255, 0.7);
  background: rgba(29, 52, 89, 0.78);
  color: #dceeff;
  font-weight: bold;
  letter-spacing: 0.4px;
  border-radius: 10px;
  min-width: 108px;
  min-height: 42px;
  padding: 10px 14px;
  cursor: pointer;
}
.overlay-btn:hover {
  background: rgba(56, 96, 161, 0.85);
}
#touch-controls {
  --control-size: clamp(56px, 11vw, 68px);
  --control-gap: clamp(6px, 1.8vw, 10px);
  --edge-pad: clamp(6px, 1.5vw, 12px);
  --fire-size: clamp(82px, 16vw, 102px);

  position: absolute;
  inset: 0;
  pointer-events: none;
}
#touch-controls.compact {
  --control-size: 52px;
  --control-gap: 6px;
  --edge-pad: 6px;
  --fire-size: 78px;
}
#touch-controls.ultra-compact {
  --control-size: 48px;
  --control-gap: 4px;
  --edge-pad: 4px;
  --fire-size: 70px;
}
.touch-btn {
  pointer-events: auto;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  border: 1px solid rgba(87, 184, 255, 0.5);
  background: rgba(25, 44, 78, 0.55);
  color: #cbe6ff;
  font-size: clamp(18px, 4vw, 24px);
  border-radius: 12px;
  width: var(--control-size);
  height: var(--control-size);
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
}
.touch-btn.active {
  background: rgba(87, 184, 255, 0.35);
  box-shadow: 0 0 10px rgba(87, 184, 255, 0.65);
}
#btn-up {
  left: calc(var(--safe-left) + var(--edge-pad) + var(--control-size) + var(--control-gap));
  bottom: calc(var(--safe-bottom) + var(--edge-pad) + (var(--control-size) + var(--control-gap)) * 2);
}
#btn-left {
  left: calc(var(--safe-left) + var(--edge-pad));
  bottom: calc(var(--safe-bottom) + var(--edge-pad) + var(--control-size) + var(--control-gap));
}
#btn-down {
  left: calc(var(--safe-left) + var(--edge-pad) + var(--control-size) + var(--control-gap));
  bottom: calc(var(--safe-bottom) + var(--edge-pad));
}
#btn-right {
  left: calc(var(--safe-left) + var(--edge-pad) + (var(--control-size) + var(--control-gap)) * 2);
  bottom: calc(var(--safe-bottom) + var(--edge-pad) + var(--control-size) + var(--control-gap));
}
#btn-fire {
  right: calc(var(--safe-right) + var(--edge-pad));
  bottom: calc(var(--safe-bottom) + var(--edge-pad) + var(--control-size));
  width: var(--fire-size);
  height: var(--fire-size);
  border-radius: 999px;
  font-size: clamp(14px, 2.4vw, 16px);
  font-weight: bold;
  letter-spacing: 0.5px;
}
#hint {
  width: min(95vw, 720px);
  margin-top: 8px;
  text-align: center;
  font-size: 11px;
  color: #6f8bc7;
  padding-bottom: 4px;
}

@media (max-width: 760px) {
  #score-bar {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    font-size: 12px;
  }
}

@media (max-width: 460px) {
  #score-bar {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    font-size: 11px;
  }
  #back-link {
    font-size: 13px;
  }
}

@media (pointer: coarse) and (min-width: 900px) {
  #touch-controls {
    --control-size: 64px;
    --control-gap: 10px;
    --edge-pad: 14px;
    --fire-size: 104px;
  }
}

/* Hide touch controls for fine pointer devices by default */
@media (pointer: fine) {
  #touch-controls { display: none; }
}
</style>
</head>
<body>
  <a id="back-link" href="../">&#8592; OpenArcade</a>

  <div id="score-bar">
    <span class="hud-item">SCORE <span class="value" id="score">0</span></span>
    <span class="hud-item">BEST <span class="value" id="best">0</span></span>
    <span class="hud-item">HP <span class="value" id="hp">100</span></span>
    <span class="hud-item">ENEMIES <span class="value" id="enemies">0</span></span>
    <span class="hud-item">STATE <span class="value" id="phase">MENU</span></span>
  </div>

  <div id="game-wrap">
    <canvas id="game" width="720" height="420"></canvas>

    <div id="touch-controls" aria-hidden="true">
      <button class="touch-btn" id="btn-up">&#9650;</button>
      <button class="touch-btn" id="btn-left">&#9664;</button>
      <button class="touch-btn" id="btn-down">&#9660;</button>
      <button class="touch-btn" id="btn-right">&#9654;</button>
      <button class="touch-btn" id="btn-fire">FIRE</button>
    </div>

    <div id="overlay">
      <h1 id="overlayTitle">TANK ROYALE</h1>
      <p id="overlayText">Destroy all enemy tanks to win.
If your HP hits zero, you lose.</p>
      <div id="overlayButtons">
        <button class="overlay-btn" id="overlayPlay">PLAY</button>
        <button class="overlay-btn" id="overlayRestart" hidden>RESTART</button>
        <button class="overlay-btn" id="overlayMenu" hidden>MENU</button>
      </div>
    </div>
  </div>

  <div id="hint">Move: WASD / Arrow Keys / Touch D-pad. Fire: Space / Touch FIRE. Esc or M for menu.</div>

  <script type="module">
    import { createGame } from './game.js';
    createGame();
  </script>
  <script src="../rating.js?v=2"></script>
</body>
</html>
